<!DOCTYPE html>
<html id="ubol-zapper">

<head>
<meta charset="utf-8">
<meta name="color-scheme" content="light dark">
<title>ZuBlock Zapper</title>
<link rel="stylesheet" href="/css/default.css">
<link rel="stylesheet" href="/css/tool-overlay-ui.css">
<link rel="stylesheet" href="/css/zapper-ui.css">
</head>

<body>
<aside>
    <div id="quit" data-i18n-title="zapperTipQuit">
        <svg viewBox="0 0 64 64"><path d="M16 16L48 48M16 48L48 16" /></svg>
    </div>
    <div id="pick">
        <svg viewBox="0 0 64 64">
            <path d="M10 32L54 32M32 10L32 54" />
            <circle cx="32" cy="32" r="12" />
        </svg>
    </div>
    <section id="zapperSave">
        <button id="saveZap" type="button" disabled>
            <svg viewBox="0 0 64 64"><path d="M14 10h30l6 6v38H14zM22 10v16h20V10M22 42h20"/></svg>
            <span data-i18n="zapperSaveEdit">_</span>
        </button>
        <span id="zapStatus" data-i18n="zapperSaveWaiting">_</span>
    </section>
</aside>
<svg id="overlay"><path d></path><path d="M0 0"></path></svg>

<script src="js/theme.js" type="module"></script>
<script src="js/i18n.js" type="module"></script>
<script src="js/zapper-ui.js" type="module"></script>

</body>
</html>
